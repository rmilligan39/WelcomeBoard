<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<title>Welcome Board — The Fedeli Group</title>
<link href="https://fonts.googleapis.com/css2?family=Rokkitt:wght@400;600;700&family=Open+Sans:wght@300;400;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --maroon: #5A0A1A;
    --maroon-deep: #3E0712;
    --maroon-light: #7A1A2E;
    --gold: #AD9551;
    --gold-light: #C4AC6A;
    --gold-dim: #8A7641;
    --cream: #F5F0E8;
    --flap-bg: #2A2A2A;
    --flap-dark: #222222;
  }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--maroon-deep);
    font-family: 'Open Sans', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background:
      radial-gradient(ellipse at 50% 8%, rgba(173,149,81,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 60%),
      linear-gradient(180deg, #4A0915 0%, var(--maroon-deep) 40%, #2E0610 100%);
  }

  .logo-area {
    margin-top: 55px;
    width: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-area img {
    width: 100%;
    height: auto;
  }

  .divider {
    width: 700px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    margin: 38px 0;
    opacity: 0.45;
  }

  .welcome-heading {
    font-family: 'Rokkitt', serif;
    font-weight: 600;
    font-size: 58px;
    color: var(--gold);
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.3;
    padding: 0 60px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .welcome-heading .sub {
    display: block;
    font-size: 72px;
    letter-spacing: 6px;
    font-weight: 700;
    margin-top: 4px;
  }

  .datetime-display {
    position: absolute;
    top: 0; left: 0;
    width: 1080px; height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(173,149,81,0.06) 0%, transparent 60%),
      var(--maroon-deep);
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
    z-index: 100;
  }

  .datetime-display.visible { opacity: 1; }

  .datetime-date {
    font-family: 'Rokkitt', serif;
    font-size: 64px; font-weight: 600;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .datetime-time {
    font-family: 'Open Sans', sans-serif;
    font-size: 140px; font-weight: 300;
    color: var(--cream);
    letter-spacing: 8px;
    margin-top: 20px;
  }

  .datetime-day {
    font-family: 'Open Sans', sans-serif;
    font-size: 36px; font-weight: 300;
    color: var(--gold-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .names-container {
    margin-top: 45px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    width: 1040px;
  }

  .flap-row {
    display: flex;
    gap: 3px;
    justify-content: center;
    width: 100%;
    height: 54px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .flap-row.active { opacity: 1; }

  /* ── Split-Flap Character Cell ── */
  .flap-char {
    flex: 1 1 0;
    height: 54px;
    position: relative;
    perspective: 300px;
    max-width: 46px;
  }

  /* Top half - shows upper portion of character */
  .flap-char .half-top {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 50%;
    overflow: hidden;
    background: var(--flap-bg);
    border-radius: 3px 3px 0 0;
    border-bottom: 1px solid rgba(0,0,0,0.7);
  }

  .flap-char .half-top span {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600; font-size: 38px;
    color: var(--gold-light);
    display: block;
    line-height: 54px;
    text-align: center;
  }

  /* Bottom half - shows lower portion of character */
  .flap-char .half-bottom {
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 50%;
    overflow: hidden;
    background: var(--flap-dark);
    border-radius: 0 0 3px 3px;
  }

  .flap-char .half-bottom span {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600; font-size: 38px;
    color: var(--gold-light);
    display: block;
    line-height: 54px;
    text-align: center;
    margin-top: -27px;
  }

  /* Flip panel - hinged at bottom of top-half */
  .flap-char .flap {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 50%;
    transform-origin: bottom center;
    transform-style: preserve-3d;
    z-index: 2;
  }

  .flap-char .flap .flap-front,
  .flap-char .flap .flap-back {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden;
    overflow: hidden;
  }

  .flap-char .flap .flap-front {
    background: var(--flap-bg);
    border-radius: 3px 3px 0 0;
    border-bottom: 1px solid rgba(0,0,0,0.7);
  }

  .flap-char .flap .flap-front span {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600; font-size: 38px;
    color: var(--gold-light);
    display: block; line-height: 54px; text-align: center;
  }

  .flap-char .flap .flap-back {
    background: var(--flap-dark);
    border-radius: 0 0 3px 3px;
    transform: rotateX(180deg);
  }

  .flap-char .flap .flap-back span {
    font-family: 'Open Sans', sans-serif;
    font-weight: 600; font-size: 38px;
    color: var(--gold-light);
    display: block; line-height: 54px; text-align: center;
    margin-top: -27px;
  }

  .flap-char .flap.flipping {
    animation: flipDown 0.18s ease-in forwards;
  }

  @keyframes flipDown {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-180deg); }
  }

  body::after {
    content: '';
    position: fixed; bottom: 0; left: 0;
    width: 100%; height: 200px;
    background: linear-gradient(0deg, rgba(173,149,81,0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .corner-clock {
    position: fixed; bottom: 30px; right: 40px;
    font-family: 'Open Sans', sans-serif;
    font-weight: 300; font-size: 28px;
    color: var(--gold-dim);
    opacity: 0.5; letter-spacing: 2px;
  }

  /* ── Company Carousel ── */
  .carousel-display {
    position: absolute;
    top: 0; left: 0;
    width: 1080px; height: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(173,149,81,0.06) 0%, transparent 60%),
      var(--maroon-deep);
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
    z-index: 90;
  }

  .carousel-display.visible { opacity: 1; }

  .carousel-label {
    font-family: 'Rokkitt', serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--gold-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 50px;
    opacity: 0.7;
  }

  .carousel-company-name {
    font-family: 'Rokkitt', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 3px;
    text-align: center;
    padding: 0 80px;
    margin-bottom: 40px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .carousel-company-name.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .carousel-logo-frame {
    width: 500px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s ease 0.15s, transform 0.8s ease 0.15s;
  }

  .carousel-logo-frame.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .carousel-logo-frame img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .carousel-logo-placeholder {
    font-family: 'Open Sans', sans-serif;
    font-size: 22px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .carousel-dots {
    display: flex;
    gap: 12px;
    margin-top: 50px;
  }

  .carousel-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold-dim);
    opacity: 0.3;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .carousel-dot.active {
    opacity: 1;
    transform: scale(1.3);
    background: var(--gold);
  }
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/Z" alt="The Fedeli Group">
  </div>

  <div class="divider"></div>

  <div class="welcome-heading">
    Welcome
    <span class="sub">Esteemed Guests</span>
  </div>

  <div class="divider" style="margin-top: 36px; margin-bottom: 40px;"></div>

  <div class="names-container" id="namesContainer"></div>

  <div class="datetime-display" id="datetimeDisplay">
    <div class="datetime-day" id="dtDay"></div>
    <div class="datetime-date" id="dtDate"></div>
    <div class="datetime-time" id="dtTime"></div>
  </div>


  <!-- Company Logo Carousel -->
  <div class="carousel-display" id="carouselDisplay">
    <div class="carousel-label">Our Guests</div>
    <div class="carousel-company-name" id="carouselName"></div>
    <div class="carousel-logo-frame" id="carouselFrame">
      <div class="carousel-logo-placeholder" id="carouselLogo">LOGO</div>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>
  </div>
  <div class="corner-clock" id="cornerClock"></div>

<script>
  const NAMES = [
    "George Washington","John Adams","Thomas Jefferson",
    "James Madison","James Monroe","John Quincy Adams",
    "Andrew Jackson","Martin Van Buren","William Henry Harrison",
    "John Tyler","James K. Polk","Zachary Taylor",
    "Millard Fillmore","Franklin Pierce","James Buchanan",
    "Abraham Lincoln","Andrew Johnson","Ulysses S. Grant",
    "Rutherford B. Hayes","James A. Garfield","Chester A. Arthur",
    "Grover Cleveland","Benjamin Harrison","Grover Cleveland",
    "William McKinley","Theodore Roosevelt","William Howard Taft",
    "Woodrow Wilson","Warren G. Harding","Calvin Coolidge"
  ];

  const MAX_CHARS = 24;
  const HOLD_TIME = 120000;       // 2 min hold
  const DATETIME_DISPLAY_TIME = 8000;
  const NAME_REVEAL_DELAY = 120;  // ms between rows
  const CHAR_FLIP_DELAY = 25;     // ms between chars in a row
  const FLIP_CYCLES = 4;


  // ═══════════════════════════════════════════════════════
  // COMPANY CAROUSEL CONFIG
  // To add real logos: set logo_src to an image path or
  // base64 data URI, e.g. "data:image/png;base64,..."
  // Set ENABLE_CAROUSEL to false to skip the carousel.
  // ═══════════════════════════════════════════════════════
  const ENABLE_CAROUSEL = true;
  const CAROUSEL_SLIDE_TIME = 5000;  // ms per company slide

  const COMPANIES = [
    { name: "Acme Corporation",       logo_src: "" },
    { name: "Wayne Enterprises",      logo_src: "" },
    { name: "Stark Industries",       logo_src: "" },
    { name: "Umbrella Corporation",   logo_src: "" },
    { name: "Globex Corporation",     logo_src: "" },
  ];

  const carouselDisplay = document.getElementById('carouselDisplay');
  const carouselName    = document.getElementById('carouselName');
  const carouselFrame   = document.getElementById('carouselFrame');
  const carouselLogo    = document.getElementById('carouselLogo');
  const carouselDots    = document.getElementById('carouselDots');

  function showCarousel() {
    if (!ENABLE_CAROUSEL || COMPANIES.length === 0) return Promise.resolve();

    return new Promise(resolve => {
      // Build dots
      carouselDots.innerHTML = '';
      COMPANIES.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'carousel-dot';
        dot.dataset.index = i;
        carouselDots.appendChild(dot);
      });

      carouselDisplay.classList.add('visible');
      let idx = 0;

      function showSlide() {
        const company = COMPANIES[idx];

        // Reset animations
        carouselName.classList.remove('visible');
        carouselFrame.classList.remove('visible');
        carouselName.textContent = company.name;

        // Set logo or placeholder
        if (company.logo_src) {
          carouselLogo.innerHTML = '<img src="' + company.logo_src + '" alt="' + company.name + '">';
        } else {
          carouselLogo.innerHTML = '<span class="carousel-logo-placeholder">' + company.name + '</span>';
        }

        // Update dots
        carouselDots.querySelectorAll('.carousel-dot').forEach((d, i) => {
          d.classList.toggle('active', i === idx);
        });

        // Animate in
        requestAnimationFrame(() => {
          carouselName.classList.add('visible');
          carouselFrame.classList.add('visible');
        });

        idx++;
        if (idx < COMPANIES.length) {
          setTimeout(showSlide, CAROUSEL_SLIDE_TIME);
        } else {
          setTimeout(() => {
            carouselDisplay.classList.remove('visible');
            setTimeout(resolve, 1200);
          }, CAROUSEL_SLIDE_TIME);
        }
      }

      // Small delay then start
      setTimeout(showSlide, 800);
    });
  }

  const container = document.getElementById('namesContainer');
  const dtDisplay = document.getElementById('datetimeDisplay');
  const dtDay = document.getElementById('dtDay');
  const dtDate = document.getElementById('dtDate');
  const dtTime = document.getElementById('dtTime');
  const cornerClock = document.getElementById('cornerClock');
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

  function updateCornerClock() {
    const now = new Date();
    const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
    cornerClock.textContent = (h % 12 || 12) + ':' + m + ' ' + (h >= 12 ? 'PM' : 'AM');
  }
  setInterval(updateCornerClock, 10000);
  updateCornerClock();

  function buildRows() {
    container.innerHTML = '';
    const rows = [];
    for (let i = 0; i < NAMES.length; i++) {
      const row = document.createElement('div');
      row.className = 'flap-row';
      const chars = [];
      for (let c = 0; c < MAX_CHARS; c++) {
        const el = document.createElement('div');
        el.className = 'flap-char';
        el.innerHTML =
          '<div class="half-top"><span>\u00a0</span></div>' +
          '<div class="half-bottom"><span>\u00a0</span></div>' +
          '<div class="flap">' +
            '<div class="flap-front"><span>\u00a0</span></div>' +
            '<div class="flap-back"><span>\u00a0</span></div>' +
          '</div>';
        row.appendChild(el);
        chars.push(el);
      }
      container.appendChild(row);
      rows.push({ element: row, chars });
    }
    return rows;
  }

  /*
   * Split-flap mechanic:
   *   half-top    = static top half (revealed when front panel flips away)
   *   half-bottom = static bottom half (covered by back panel landing)
   *   flap-front  = top-hinged panel front: shows OLD char top-half
   *   flap-back   = top-hinged panel back:  shows NEW char bottom-half
   *
   * Sequence:
   *   1. Set half-top to NEW char (hidden behind front panel, revealed after flip)
   *   2. Set flap-front to OLD char (matches what was showing)
   *   3. Set flap-back to NEW char (bottom half, lands over half-bottom)
   *   4. Flip panel down
   *   5. After flip: update half-bottom to NEW char
   */
  function flipChar(charDiv, targetChar) {
    return new Promise(resolve => {
      if (targetChar === ' ') {
        resolve();
        return;
      }
      // all cells uniform width

      const halfTop = charDiv.querySelector('.half-top span');
      const halfBottom = charDiv.querySelector('.half-bottom span');
      const flap = charDiv.querySelector('.flap');
      const flapFront = flap.querySelector('.flap-front span');
      const flapBack = flap.querySelector('.flap-back span');

      let cycle = 0;
      const totalCycles = FLIP_CYCLES + Math.floor(Math.random() * 3);

      function doFlip(newChar, isFinal) {
        const oldChar = halfBottom.textContent || '\u00a0';

        // 1. Behind the front panel, place the NEW char in static top
        halfTop.textContent = newChar;

        // 2. Front of flap shows the OLD char (top half) — matches current display
        flapFront.textContent = oldChar;

        // 3. Back of flap shows the NEW char (bottom half) — will land over static bottom
        flapBack.textContent = newChar;

        // 4. Trigger flip animation
        flap.classList.remove('flipping');
        void flap.offsetWidth;
        flap.classList.add('flipping');

        setTimeout(() => {
          // 5. Flip done: update static bottom to match, reset panel
          halfBottom.textContent = newChar;
          flap.classList.remove('flipping');
          flap.style.transform = '';

          // Reset panel to un-flipped with new char on front
          flapFront.textContent = newChar;

          if (isFinal) resolve();
        }, 180);
      }

      function nextCycle() {
        cycle++;
        if (cycle > totalCycles) {
          doFlip(targetChar, true);
        } else {
          doFlip(ALPHA[Math.floor(Math.random() * 26)], false);
          setTimeout(nextCycle, 120);
        }
      }
      nextCycle();
    });
  }

  function flipRow(rowData, name) {
    return new Promise(resolve => {
      const trimmed = name.toUpperCase().trim();
      const padLeft = Math.floor((MAX_CHARS - trimmed.length) / 2);
      const centered = ' '.repeat(padLeft) + trimmed + ' '.repeat(MAX_CHARS - padLeft - trimmed.length);
      rowData.element.classList.add('active');
      let completed = 0;
      for (let i = 0; i < MAX_CHARS; i++) {
        setTimeout(() => {
          flipChar(rowData.chars[i], centered[i]).then(() => {
            completed++;
            if (completed === MAX_CHARS) resolve();
          });
        }, i * CHAR_FLIP_DELAY);
      }
    });
  }

  function showDateTime() {
    return new Promise(resolve => {
      const now = new Date();
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      dtDay.textContent = days[now.getDay()];
      dtDate.textContent = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
      const h = now.getHours();
      dtTime.textContent = (h%12||12) + ':' + String(now.getMinutes()).padStart(2,'0') + ' ' + (h>=12?'PM':'AM');
      dtDisplay.classList.add('visible');
      const iv = setInterval(() => {
        const n = new Date(), hh = n.getHours();
        dtTime.textContent = (hh%12||12) + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0') + ' ' + (hh>=12?'PM':'AM');
      }, 1000);
      setTimeout(() => { clearInterval(iv); dtDisplay.classList.remove('visible'); setTimeout(resolve, 1500); }, DATETIME_DISPLAY_TIME);
    });
  }

  async function run() {
    while (true) {
      const rows = buildRows();
      for (let i = 0; i < NAMES.length; i++) {
        await new Promise(r => setTimeout(r, NAME_REVEAL_DELAY));
        await flipRow(rows[i], NAMES[i]);
      }
      await new Promise(r => setTimeout(r, HOLD_TIME));
      await showCarousel();
      await showDateTime();
      await new Promise(r => setTimeout(r, 1000));
    }
  }
  run();
</script>
